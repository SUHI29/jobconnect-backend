<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartJob - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; min-height: 100vh; display: flex; }
        .sidebar { width: 260px; background-color: #0f172a; color: #94a3b8; display: flex; flex-direction: column; padding: 24px; position: fixed; height: 100vh; }
        .sidebar-brand { color: #ffffff; font-size: 22px; font-weight: 800; margin-bottom: 40px; }
        .sidebar-brand span { color: #3b82f6; }
        .nav-list { display: flex; flex-direction: column; gap: 8px; list-style: none; }
        .nav-item a { display: flex; align-items: center; padding: 12px 16px; color: #94a3b8; text-decoration: none; font-weight: 600; border-radius: 8px; }
        .nav-item.active a, .nav-item a:hover { background-color: #1e293b; color: #3b82f6; }
        .main-content { margin-left: 260px; flex: 1; padding: 40px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .welcome-msg h1 { font-size: 28px; font-weight: 800; }
        .jobs-feed { display: flex; flex-direction: column; gap: 20px; }
        .job-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; display: flex; justify-content: space-between; align-items: center; }
        .job-details { display: flex; gap: 20px; align-items: center; }
        .job-icon { width: 48px; height: 48px; background: #f0fdf4; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .job-tags { display: flex; gap: 8px; margin-top: 8px; }
        .job-tag { padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; background: #f1f5f9; color: #475569; }
        .job-tag.matched { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .match-percent { font-size: 20px; font-weight: 800; color: #16a34a; text-align: right; margin-right: 15px; }
        .btn-apply { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-decoration: none; }
    </style>
    <link rel="stylesheet" href="/responsive.css">
</head>
<script>
   
    const urlParams = new URLSearchParams(window.location.search);
    const uId = urlParams.get('userId');
    if(uId) {
        document.querySelectorAll('.sidebar a').forEach(link => {
            if(!link.getAttribute('href').includes('?')) {
                link.href = link.getAttribute('href').split('?')[0] + '?userId=' + uId;
            }
        });
    }
</script><body>
    <div class="sidebar">
        <div class="sidebar-brand">Job <span>Connect</span></div>
        <ul class="nav-list">
            <li class="nav-item active"><a href="#">📊 Dashboard</a></li>
            <li class="nav-item"><a href="#" onclick="window.location.href='/profile.html?userId='+currentUserId">👤 Profile</a></li>
            <li class="nav-item"><a href="#" onclick="window.location.href='/applications.html?userId='+currentUserId">📁 My Applications</a></li>
        </ul>
      <div style="border-top: 1px solid #1e293b; padding-top: 16px; margin-top: auto; width: 100%;">
    <button onclick="logoutUser()" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 16px; color: #ef4444; background: #2d1616; border: 1px solid #ef4444; font-weight: 700; border-radius: 8px; cursor: pointer; font-size: 15px; transition: all 0.2s;">
        🚪 Logout
    </button>
</div>
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <div class="welcome-msg">
                <h1 id="userGreeting">Hi, User!</h1>
                <p>Recommended jobs based on your skills</p>
            </div>
        </div>
        <div class="jobs-feed" id="dynamicJobsArea"></div>
    </div>
    
    <script>
        let currentUserId = new URLSearchParams(window.location.search).get('userId');
        
            function loadRecommendedJobs() {
         let url = `/api/users/${currentUserId}/recommendations`;
            fetch(url).then(res => res.json()).then(jobs => {
                let feed = document.getElementById('dynamicJobsArea');
                feed.innerHTML = jobs.length === 0 ? '<p>No matching jobs found based on your profile skills.</p>' : '';
                
                jobs.forEach(job => {
                    let tagsHTML = '';
                    if (job.matchedSkills && job.matchedSkills.length > 0) {
                        job.matchedSkills.forEach(skill => {
                            tagsHTML += `<span class="tag tag-matched" style="background-color: #dcfce7; color: #16a34a; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-right: 6px; display: inline-block;">✓ ${skill}</span>`;
                        });
                    } else {
                        tagsHTML = `<span class="tag" style="background-color: #fee2e2; color: #dc2626; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;">No matching skills</span>`;
                    }

                    
                    feed.innerHTML += `
                        <div class="job-card">
                            <div class="job-details">
                                <div class="job-icon">${job.icon}</div>
                                <div>
                                    <h3>${job.title}</h3>
                                    <p>${job.company}</p>
                                    <div class="job-tags" style="margin-top: 10px;">${tagsHTML}</div>
                                </div>
                            </div>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="match-percent" style="font-weight:700; color:#2563eb; font-size:20px;">${job.matchPercent}%</div>
                                <a href="/job-details.html?userId=${currentUserId}&jobTitle=${encodeURIComponent(job.title)}&company=${encodeURIComponent(job.company)}&match=${job.matchPercent}" class="btn-apply" style="padding:10px 15px; background:#3b82f6; color:white; text-decoration:none; border-radius:8px; font-weight:700;">View Details</a>
                            </div>
                        </div>`;
                });
            });
        }
        window.addEventListener('DOMContentLoaded', () => {
            fetch(`/api/users/${currentUserId}`).then(res => res.json()).then(u => {
                document.getElementById('userGreeting').textContent = `Hi, ${u.fullname}!`;
            });
            loadRecommendedJobs();
        });
      
function logoutUser() {
    localStorage.clear();
    sessionStorage.clear(); 
    alert("Logged out successfully!");
    window.location.href = "/login.html"; 
}
    </script>
</body>
</html>
