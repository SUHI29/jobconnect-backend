<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartJob - Login / Signup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #f0fdf4 0%, #eff6ff 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
       
        .auth-container { background-color: #ffffff; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); display: flex; width: 100%; max-width: 950px; min-height: 550px; overflow: hidden; }
        
       
        .auth-sidebar { flex: 1; background-color: #eff6ff; padding: 50px 40px; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #e2e8f0; }
        .auth-sidebar h2 { color: #3b82f6; font-size: 28px; font-weight: 800; margin-bottom: 25px; }
        .auth-sidebar h1 { font-size: 36px; font-weight: 800; color: #1e293b; line-height: 1.2; margin-bottom: 20px; }
        .auth-sidebar h1 span { color: #2563eb; }
        .auth-sidebar p { color: #64748b; font-size: 15px; line-height: 1.6; }
        
        
        .auth-form-section { flex: 1; padding: 50px 50px; display: flex; flex-direction: column; justify-content: center; background-color: #ffffff; }
        
        
        .form-header h2 { font-size: 28px; font-weight: 800; color: #1e293b; margin-bottom: 8px; text-align: center; }
        .form-header p { font-size: 14px; color: #64748b; margin-bottom: 25px; text-align: center; }
        
        
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .form-group label { font-size: 14px; font-weight: 600; color: #475569; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; outline: none; }
        .form-group input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        

        .inline-alert { display: none; padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; margin-bottom: 20px; text-align: center; line-height: 1.4; }
        .alert-error { background-color: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
        .alert-success { background-color: #f0fdf4; color: #16a34a; border: 1px solid #dcfce7; }
        
        
        .btn-submit { width: 100%; padding: 14px; background-color: #2563eb; color: #ffffff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 5px; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        .btn-submit:hover { background-color: #1d4ed8; }
        
        
        .form-footer { margin-top: 25px; text-align: center; font-size: 14px; color: #64748b; }
        .form-footer a { color: #2563eb; text-decoration: none; font-weight: 600; cursor: pointer; }
        .form-footer a:hover { text-decoration: underline; }
    </style>
    <link rel="stylesheet" href="/responsive.css">
</head>
<body>

    <div class="auth-container">
        
        <div class="auth-sidebar">
            <h2>Job Connect</h2>
            <h1>Find Your Dream<br>Job </span></h1>
            <p>Smart matching for the perfect career opportunities based on your skills profile matrix.</p>
        </div>
        
        <div class="auth-form-section">
            
            <div id="statusAlert" class="inline-alert"></div>
            
            <div id="loginFormBlock" style="display: block;">
                <div class="form-header">
                    <h2>Welcome Back!</h2>
                    <p>Login to your account</p>
                </div>
                
              <form action="/api/users/form-login" method="POST">
                    <div class="form-group">
                        <label>Email ID</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn-submit">Login</button>
                </form>
                
                <div class="form-footer">
                    Don't have an account? <a onclick="switchToSignup()">Sign up</a>
                </div>
            </div>
            
            <div id="signupFormBlock" style="display: none;">
                <div class="form-header">
                    <h2>Create Account</h2>
                    <p>Get started with Job Connect</p>
                </div>
                
              <form action="/api/users/form-signup" method="POST">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="fullName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Email ID</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn-submit">Sign Up</button>
                </form>
                
                <div class="form-footer">
                    Already have an account? <a onclick="switchToLogin()">Login</a>
                </div>
            </div>

        </div>
    </div>

 <script>
        const alertBox = document.getElementById('statusAlert');

        function showSignupView() {
            document.getElementById('loginFormBlock').style.display = 'none';
            document.getElementById('signupFormBlock').style.display = 'block';
        }

        function showLoginView() {
            document.getElementById('loginFormBlock').style.display = 'block';
            document.getElementById('signupFormBlock').style.display = 'none';
        }

        function switchToSignup() {
            alertBox.style.display = 'none';
            showSignupView();
        }

        function switchToLogin() {
            alertBox.style.display = 'none';
            showLoginView();
        }

        
        function checkAdminLogin(event) {
           
            const emailInput = document.querySelector('input[name="email"]').value;
            const passwordInput = document.querySelector('input[name="password"]').value;

            
            if (emailInput === "admin@gmail.com" && passwordInput === "admin123") {
                event.preventDefault(); 
                window.location.href = "/admin.html";
                return false;
            }
            return true; 
        }

        window.addEventListener('DOMContentLoaded', () => {
            
            const loginForm = document.querySelector('#loginFormBlock form');
            if (loginForm) {
                loginForm.addEventListener('submit', checkAdminLogin);
            }

            const urlParams = new URLSearchParams(window.location.search);
            const errorParam = urlParams.get('error');
            const successParam = urlParams.get('success');
            
            if (errorParam === 'exists') {
                alertBox.textContent = "⚠️ This Email ID is already registered! Please use another email or Login.";
                alertBox.className = "inline-alert alert-error";
                alertBox.style.display = "block";
                showSignupView();
                return;
            }
            
            if (errorParam === 'invalid') {
                alertBox.textContent = "❌ Invalid Email ID or Password! Please try again.";
                alertBox.className = "inline-alert alert-error";
                alertBox.style.display = "block";
                showLoginView();
                return;
            }

            if (successParam === 'registered') {
                alertBox.textContent = "✅ Account created successfully! Please Login to continue.";
                alertBox.className = "inline-alert alert-success";
                alertBox.style.display = "block";
                showLoginView();
                return;
            }

            if (urlParams.get('mode') === 'signup') {
                showSignupView();
            } else {
                showLoginView();
            }
        });
    </script>
</body>
</html>
