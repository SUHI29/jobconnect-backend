<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Connect - My Applications</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; min-height: 100vh; display: flex; }
        
        
        .sidebar { width: 260px; background-color: #0f172a; color: #94a3b8; display: flex; flex-direction: column; padding: 24px; position: fixed; height: 100vh; }
        .sidebar-brand { color: #ffffff; font-size: 22px; font-weight: 800; margin-bottom: 40px; }
        .sidebar-brand span { color: #3b82f6; }
        .nav-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .nav-item a { display: flex; align-items: center; padding: 12px 16px; color: #94a3b8; text-decoration: none; font-weight: 600; border-radius: 8px; }
        .nav-item.active a { background-color: #1e293b; color: #3b82f6; }
        .nav-item a:hover { background-color: #1e293b; color: #3b82f6; }

       
        .main-content { margin-left: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 16px; color: #64748b; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
        td { padding: 20px 16px; border-bottom: 1px solid #f1f5f9; color: #1e293b; font-weight: 500; }
        .status-badge { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .Pending { background: #fef3c7; color: #d97706; }
        .Accepted { background: #dcfce7; color: #16a34a; }
        .Rejected { background: #fee2e2; color: #dc2626; }
    </style>
    <link rel="stylesheet" href="/responsive.css">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">Job <span>Connect</span></div>
        <ul class="nav-list">
            <li class="nav-item"><a href="#" id="dashLink">📊 Dashboard</a></li>
            <li class="nav-item"><a href="#" id="profLink">👤 Profile</a></li>
            <li class="nav-item active"><a href="#">📁 My Applications</a></li>
        </ul>
      <div style="border-top: 1px solid #1e293b; padding-top: 16px; margin-top: auto; width: 100%;">
    <button onclick="logoutUser()" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 16px; color: #ef4444; background: #2d1616; border: 1px solid #ef4444; font-weight: 700; border-radius: 8px; cursor: pointer; font-size: 15px; transition: all 0.2s;">
        🚪 Logout
    </button>
</div>
    </div>
    </div>

    <div class="main-content">
        <h1>Track My Applications</h1>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>JOB ROLE</th>
                        <th>COMPANY</th>
                        <th>MATCHING SCORE</th>
                        <th>APPLICATION STATUS</th>
                    </tr>
                </thead>
                <tbody id="appTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userId');
            const tbody = document.getElementById('appTableBody');
            
           
            if(userId) {
                document.getElementById('dashLink').href = `dashboard.html?userId=${userId}`;
                document.getElementById('profLink').href = `profile.html?userId=${userId}`;
            }

           
            if (!userId) {
                tbody.innerHTML = '<tr><td colspan="4" style="color:red; text-align:center;">User ID missing!</td></tr>';
                return;
            }

fetch(`/api/users/${userId}/applications`)
                .then(res => res.json())
                .then(apps => {
                    // Filter Saved & Clear Loading
                    const displayApps = apps.filter(app => app.status !== 'Saved');
                    tbody.innerHTML = ''; 
                    
                    if(displayApps.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No applications found.</td></tr>';
                        return;
                    }

                    tbody.innerHTML = displayApps.map(app => `
                        <tr>
                            <td>💼 ${app.jobTitle || 'N/A'}</td>
                            <td>${app.company || 'N/A'}</td>
                            <td style="color:#2563eb; font-weight:bold;">🎯 ${app.matchPercent || 0}%</td>
                            <td><span class="status-badge ${app.status || 'Pending'}">${app.status || 'Pending'}</span></td>
                        </tr>
                    `).join('');
                })
                .catch(err => {
                    console.error("Error:", err);
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Failed to load data.</td></tr>';
                });
        });
        
function logoutUser() {
    localStorage.clear();
    sessionStorage.clear();
    alert("Logged out successfully!");
    window.location.href = "/login.html"; 
}
    </script>
</body>
</html>
